seeds:
  - name: employees
    description: >
      Static reference data containing Jaffle Shop internal employees.
      This seed is loaded directly from a CSV file into the database using
      dbt seed and serves as a lookup table to identify internal staff,
      useful for excluding employee orders from customer metrics or
      joining employee data with customer records.

    columns:
      - name: employee_id
        description: "Unique identifier for each employee."
        tests:
          - not_null
          - unique

      - name: email
        description: "Employee's work email address at jaffleshop.com."
        tests:
          - not_null
          - unique

      - name: customer_id
        description: >
          Foreign key referencing the customer record associated with this employee.
          Employees may also be customers of the Jaffle Shop.
          Maps to customer_id in stg_jaffle_shop__customers.
        tests:
          - not_null
          - relationships:
              arguments:
                field: customer_id
                to: ref('stg_jaffle_shop__customers')

  - name: classification
    description: >
      The customer tier label assigned based on total lifetime spend.
      Possible values:
      - 'Regular' — total spend between $0 and $9.999
      - 'Bronze'  — total spend between $10 and $29.999
      - 'Silver'  — total spend between $30 and $49.999
      - 'Gold'    — total spend of $50 or more
    tests:
      - not_null
      - unique
      - accepted_values:
          arguments:
            values: ['Regular', 'Bronze', 'Silver', 'Gold']