models:
  - name: int_orders
    description: >
      Intermediate model that joins staged orders with aggregated successful
      payment data. Produces one row per order enriched with the total amount
      paid and the date the payment was finalised.

      This model sits between the staging layer and the mart layer — it handles
      the join logic so that downstream mart models (fct_customer_orders, fct_orders)
      can stay clean and focused on business metrics without repeating join logic.

      Only non-failed payments are included in the payment aggregation
      (status <> 'fail'), ensuring that failed payment attempts do not
      inflate the total_amount_paid.

    columns:
      - name: order_id
        description: >
          Unique identifier for each order.
          Foreign key to stg_jaffle_shop__orders.
        tests:
          - not_null
          - unique

      - name: customer_id
        description: >
          Foreign key referencing the customer who placed the order.
          Maps to customer_id in stg_jaffle_shop__customers.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id

      - name: order_date
        description: "The date the order was placed."
        tests:
          - not_null

      - name: status
        description: >
          The current status of the order.
          Possible values: placed, shipped, completed, return_pending, returned.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'return_pending', 'returned']

      - name: total_amount_paid
        description: >
          Total amount paid for the order across all non-failed payment attempts.
          Null if no successful or pending payment exists for the order.

      - name: payment_finalized_date
        description: >
          The most recent payment created_at timestamp for this order,
          representing when the payment was finalised.
          Null if no payment exists for the order.