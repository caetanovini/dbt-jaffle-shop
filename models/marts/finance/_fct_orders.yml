models:
  - name: fct_orders
    latest_version: 1
    group: finance        # ← direct property, not a list
    access: public        # ← direct property, not a list
    description: >
      Fact table containing one row per order, enriched with the total successful
      payment amount for that order. Joins staging orders with aggregated payment data.

      This model is configured as an INCREMENTAL model using the 'merge' strategy,
      meaning on each run it only processes orders with an order_date greater than
      or equal to the most recent order_date already in the table — avoiding costly
      full rebuilds on every execution.

      On the first run (or after dbt run --full-refresh), the entire table is built
      from scratch. On subsequent runs, only new or updated records are processed.

      Incremental strategy: merge
      Unique key: order_id — used to identify and update existing rows on merge.
    config:
      materialized: incremental
      unique_key: order_id
      incremental_strategy: merge
      on_schema_change: append_new_columns
      contract:
        enforced: true

    columns:
      - name: order_id
        description: >
          Unique identifier for each order. Used as the unique_key for the
          incremental merge strategy — dbt uses this column to match incoming
          records against existing rows and update them in place.
        data_type: integer
        constraints:
          - type: not_null
          - type: unique
        tests:
          - not_null
          - unique
          - dbt_utils.cardinality_equality:
              arguments:
                field: order_id
                to: ref('stg_jaffle_shop__orders')

      - name: customer_id
        description: >
          Foreign key referencing the customer who placed the order.
          Maps to customer_id in stg_jaffle_shop__customers.
        data_type: integer
        constraints:
          - type: not_null
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id

      - name: order_date
        description: >
          The date the order was placed.
        data_type: date
        constraints:
          - type: not_null
        tests:
          - not_null

      - name: amount
        description: >
          Total successful payment amount for the order in dollars.
        data_type: numeric
        constraints:
          - type: not_null
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "<= 5"
              config:
                where: "order_date = current_date"
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 100
                strictly: false

    versions:
      - v: 1
        deprecation_date: 2026-05-01
        config:
          alias: fct_orders
          on_schema_change: append_new_columns

      - v: 2
        config:
          alias: fct_orders_v2
          on_schema_change: append_new_columns
        columns:
          - include: all
            exclude: [amount]
          - name: order_amount
            data_type: numeric
          - name: order_date
            data_type: timestamp