semantic_models:
  - name: fct_orders
    model: ref('fct_orders')
    entities:
      - name: order_id
        type: primary
    dimensions:
      - name: order_date
        type: time
        type_params:
          time_granularity: day     # ← ADD this time dimension
    measures:
      - name: order_count
        agg: count
        expr: order_id
        agg_time_dimension: order_date   # ← ADD this to every measure
      - name: min_order_value
        agg: min
        expr: amount
        agg_time_dimension: order_date   # ← ADD this to every measure

metrics:
  - name: order_count
    label: order_count
    description: the number of orders placed
    type: simple
    type_params:
      measure: order_count